name: gravil
description: Gravil - Supabase chat with optional VPN toggle.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Supabase
  supabase_flutter: ^2.5.11

  # State / utils
  flutter_riverpod: ^2.6.1
  go_router: ^14.2.7
  intl: ^0.19.0

  # Media
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  record: ^5.1.2
  path_provider: ^2.1.4
  path: ^1.9.0
  uuid: ^4.5.1

  # UI
  flutter_svg: ^2.0.10+1

  # Permissions (Android)
  permission_handler: ^11.3.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
