allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(':app')
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}

// --- auto-namespace workaround ---
// Some older Flutter plugins ship without an Android Gradle `namespace`.
// Newer AGP requires it, so we default it to a stable value per module.
subprojects { subproject ->
    afterEvaluate {
        if (subproject.hasProperty('android')) {
            try {
                def ns = subproject.android.namespace
                if (ns == null || ns.toString().trim().isEmpty()) {
                    subproject.android.namespace = "com.example.${subproject.name}"
                }
            } catch (Exception ignored) {
                // ignore non-Android modules
            }
        }
    }
}

